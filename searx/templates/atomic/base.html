<!DOCTYPE html>
<html lang="{{ locale_rfc5646 }}"{% if rtl %} dir="rtl"{% endif %}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Atomic Search - Privacy-focused metasearch engine">
  <meta name="theme-color" content="#0066ff">
  <title>{% block title %}Atomic Search{% endblock %}</title>
  
  <!-- Security Headers -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
  
  <!-- Preload critical resources -->
  <link rel="preload" href="{{ url_for('static', filename='themes/atomic/style.css') }}" as="style">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='themes/atomic/style.css') }}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230066ff'/><text x='50' y='60' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>">
  
  <!-- OpenSearch -->
  <link rel="search" type="application/opensearchdescription+xml" title="Atomic Search" href="{{ opensearch_url }}">
  
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="header-container">
      <a href="{{ url_for('index') }}" class="logo">⚛ Atomic Search</a>
      <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('preferences') }}">Preferences</a>
        {% if donation_url %}<a href="{{ donation_url }}">Donate</a>{% endif %}
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Atomic Search - Privacy-focused metasearch engine | <a href="{{ url_for('info', pagename='about') }}">About</a> | <a href="{{ url_for('info', pagename='donate') }}">Support</a></p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem;">No tracking • No profiling • Open source</p>
  </footer>

  {% block script %}{% endblock %}
</body>
</html>
